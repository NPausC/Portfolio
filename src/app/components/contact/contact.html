<section id="contact" class="contact">
  <div class="page-container contact__content">
    <div class="contact__intro">
      <h2 class="contact__title">Say Hi!</h2>
    </div>

    <div class="contact__form-area">
      <h3 class="contact__subtitle">Want to discuss a new project?</h3>
      <p class="contact__text">Say hello! Let's discuss your ideas and make it happen.</p>

      <form class="contact__form">
        <input class="contact__input" type="text" placeholder="Your name" />
        <input class="contact__input" type="email" placeholder="Your email" />
        <textarea class="contact__textarea" placeholder="Your message"></textarea>

        <label class="contact__checkbox-row">
          <input class="contact__checkbox" type="checkbox" />
          <span class="contact__checkbox-text">
            I've read the <a class="contact__link" href="#">privacy policy</a> and agree to the processing of my data as outlined.
          </span>
        </label>

        <button class="contact__button" type="submit">Send message</button>
      </form>
    </div>
  </div>
</section>
