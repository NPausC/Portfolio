<article class="project-card" [class.project-card--reverse]="reverse" [class.project-card--active]="isExpanded">
  <div class="project-card__content">
    @if (reverse) {
      <span class="project-card__number">{{ projectNumber }}</span>
    }

    <div class="project-card__visual">
      <div class="project-card__image-wrapper" role="button" tabindex="0" [attr.aria-expanded]="isExpanded" (click)="expandCard()" (keydown.enter)="expandCard()" (keydown.space)="expandCard()">
        <img class="project-card__image project-card__image--mono" [src]="imageSrc" [alt]="imageAlt" />
        <img class="project-card__image project-card__image--color" [src]="hoverImageSrc || imageSrc" [alt]="imageAlt" />
        <img class="project-card__hover-frame" src="assets/images/interactions/portfolio/project-hover-frame.png" alt="" aria-hidden="true" />
        <span class="project-card__hover-indicator" aria-hidden="true">
          <img class="project-card__hover-arrow project-card__hover-arrow--down" src="assets/images/interactions/portfolio/project-hover-arrow-down.png" alt="" />
        </span>
      </div>
    </div>

    @if (!reverse) {
      <span class="project-card__number">{{ projectNumber }}</span>
    }

    <div class="project-card__text">
      <h3 class="project-card__title">{{ title }}</h3>
      <p class="project-card__subtitle">{{ subtitle }}</p>
      <p class="project-card__description">{{ description }}</p>

      <div class="project-card__actions">
        <a class="project-card__link" [href]="githubLink" target="_blank" rel="noreferrer">Github</a>
      </div>
    </div>
  </div>
</article>
