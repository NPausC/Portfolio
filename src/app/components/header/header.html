<header class="header">
  <div class="page-container header__content">
    <a class="header__logo-link" href="#">
      <span class="header__logo-text">[SE]</span>
    </a>

    <div class="header__actions">
      <div class="header__language-switch">
        <button class="header__language-button header__language-button--active" type="button">EN</button>
        <button class="header__language-button" type="button">DE</button>
      </div>

      <button
        class="header__menu-button" [class.header__menu-button--open]="menuIsOpen"
        type="button"
        [attr.aria-label]="menuIsOpen ? 'Close menu' : 'Open menu'"
        (click)="toggleMenu()"
      >
        <span class="header__menu-line"></span>
        <span class="header__menu-line"></span>
        <span class="header__menu-line"></span>
      </button>
    </div>
  </div>

  <div class="header__menu-overlay" [class.header__menu-overlay--open]="menuIsOpen">
    <div class="page-container header__menu-content">
      <nav class="header__menu-nav">
        <a class="header__menu-link" href="#about-me" (click)="toggleMenu()">About me</a>
        <a class="header__menu-link" href="#skills" (click)="toggleMenu()">Skills</a>
        <a class="header__menu-link" href="#portfolio" (click)="toggleMenu()">Portfolio</a>
        <a class="header__menu-link" href="#contact" (click)="toggleMenu()">Contact</a>
      </nav>

      <div class="header__language-switch header__language-switch--menu">
        <button class="header__language-button header__language-button--active" type="button">EN</button>
        <button class="header__language-button" type="button">DE</button>
      </div>
    </div>
  </div>
</header>
